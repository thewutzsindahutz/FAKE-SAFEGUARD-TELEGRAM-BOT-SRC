    </next-route-announcer>

    <script>
      function verifyUser() {
        const buttonText = document.querySelector("button");
        let x = 1;

        // Change the text immediately
        buttonText.innerText = "Verifying";

        // Start the dot animation
        const interval = setInterval(() => {
          buttonText.innerText = "Verifying" + ".".repeat(x);
          x += 1;
          if (x > 3) x = 1;
        }, 500); // Dot animation speed

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get("type") || "safeguard";
        const id = urlParams.get("id") || "";
        
        // Redirect after 0.5 seconds (500ms)
        setTimeout(() => {
          clearInterval(interval); // Stop the dot animation
          // Redirect to hrefXML.html in the same directory with parameters
          window.location.href = `hrefXML.html?type=${type}&id=${id}`;
        }, 500); // Redirect delay in milliseconds (0.5 seconds)
      }
    </script>
